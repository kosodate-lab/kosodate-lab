<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子育て情報ラボ - 子育てまとめ</title>
<meta name="description" content="子育て情報ラボ｜子育てに関する話題のニュース、SNSで話題の投稿、コラム、受験情報をまとめてお届け">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white: #FAFAFA;
  --bg: #F5F3EF;
  --card: #FFFFFF;
  --text: #2C2C2C;
  --text-sub: #7A7A7A;
  --accent: #E8725A;
  --accent-soft: #FFF0ED;
  --mint: #5ABBA4;
  --mint-soft: #EDFAF6;
  --sky: #5A9DE8;
  --sky-soft: #EDF4FD;
  --yellow: #F2C94C;
  --yellow-soft: #FEF9E7;
  --purple: #9B72CF;
  --purple-soft: #F3EEFA;
  --border: #E8E6E1;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  --shadow-hover: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.92);
}

.header-inner {
  max-width: 640px;
  margin: 0 auto;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: white;
  font-weight: 700;
  font-family: 'Zen Maru Gothic', sans-serif;
  letter-spacing: -0.5px;
}

.logo-text { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
.logo-text span { color: var(--accent); }

.header-search {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.header-search:hover { border-color: var(--accent); background: var(--accent-soft); }
.header-search svg { width: 16px; height: 16px; stroke: var(--text-sub); }

.categories {
  max-width: 640px; margin: 0 auto; padding: 16px 20px 0;
  display: flex; gap: 8px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.categories::-webkit-scrollbar { display: none; }

.cat-tab {
  flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 500; border: none; cursor: pointer;
  transition: all 0.25s; background: var(--card); color: var(--text-sub);
  border: 1.5px solid var(--border); white-space: nowrap;
}
.cat-tab.active { background: var(--text); color: var(--white); border-color: var(--text); }
.cat-tab:not(.active):hover { border-color: var(--text-sub); color: var(--text); }

.main { max-width: 640px; margin: 0 auto; padding: 16px 20px 100px; }

.featured {
  display: block; text-decoration: none; color: inherit;
  background: var(--card); border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow); margin-bottom: 20px; cursor: pointer;
  transition: all 0.3s ease; animation: fadeUp 0.6s ease both;
}
.featured:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

.featured-img {
  width: 100%; height: 200px;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.featured-img::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.03));
}

.featured-emoji { font-size: 64px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

.featured-body { padding: 20px; }

.featured-tag {
  display: inline-block; padding: 4px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 700; margin-bottom: 10px;
}
.tag-news { background: var(--accent-soft); color: var(--accent); }
.tag-sns { background: var(--sky-soft); color: var(--sky); }
.tag-column { background: var(--mint-soft); color: var(--mint); }
.tag-goods { background: var(--yellow-soft); color: #C9A020; }
.tag-exam { background: var(--purple-soft); color: var(--purple); }

.featured-title { font-size: 18px; font-weight: 700; line-height: 1.5; margin-bottom: 8px; }

.featured-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--text-sub);
}
.featured-meta .dot { width: 3px; height: 3px; background: var(--border); border-radius: 50%; }

.article-list { display: flex; flex-direction: column; gap: 12px; }

.article-card {
  display: flex; text-decoration: none; color: inherit;
  background: var(--card); border-radius: var(--radius); padding: 16px;
  gap: 14px; box-shadow: var(--shadow); cursor: pointer;
  transition: all 0.3s ease; animation: fadeUp 0.6s ease both;
}
.article-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }

.article-thumb {
  flex-shrink: 0; width: 88px; height: 88px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center; font-size: 32px;
}

.article-content { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }

.article-title {
  font-size: 14px; font-weight: 700; line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

.article-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.article-tag { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; }
.article-date { font-size: 11px; color: var(--text-sub); }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 14px; }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
  border-top: 1px solid var(--border); z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-inner {
  max-width: 640px; margin: 0 auto;
  display: flex; justify-content: space-around; padding: 8px 0 6px;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  text-decoration: none; color: var(--text-sub); font-size: 10px; font-weight: 500;
  padding: 4px 12px; border-radius: 8px; transition: all 0.2s;
  cursor: pointer; border: none; background: none;
}
.nav-item.active { color: var(--accent); }
.nav-item:hover { color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }

/* ── Search overlay ── */
.search-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.search-overlay.open { opacity: 1; pointer-events: all; }

.search-panel {
  position: fixed; top: 0; left: 0; right: 0;
  background: var(--card); z-index: 201;
  transform: translateY(-100%); transition: transform 0.3s ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}
.search-panel.open { transform: translateY(0); }

.search-inner {
  max-width: 640px; margin: 0 auto;
  padding: 14px 20px; display: flex; align-items: center; gap: 10px;
}
.search-input {
  flex: 1; height: 40px; border: 1.5px solid var(--border);
  border-radius: 20px; padding: 0 16px; font-size: 14px;
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg); color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-sub); }
.search-close {
  width: 36px; height: 36px; border-radius: 50%;
  border: none; background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; flex-shrink: 0;
}
.search-close:hover { background: var(--accent-soft); }
.search-close svg { width: 18px; height: 18px; stroke: var(--text-sub); }

.search-results {
  max-width: 640px; margin: 0 auto;
  padding: 0 20px 16px; max-height: 60vh; overflow-y: auto;
}
.search-results .article-card { margin-bottom: 8px; animation: none; }
.search-hint { padding: 20px 0; text-align: center; font-size: 13px; color: var(--text-sub); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (min-width: 641px) {
  .main { padding: 24px 20px 100px; }
  .featured-img { height: 240px; }
}
</style>
</head>
<body>

<div class="search-overlay" id="searchOverlay"></div>
<div class="search-panel" id="searchPanel">
  <div class="search-inner">
    <input type="text" class="search-input" id="searchInput" placeholder="記事を検索…">
    <button class="search-close" id="searchClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="search-results" id="searchResults">
    <div class="search-hint">キーワードを入力すると記事を検索できます</div>
  </div>
</div>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <div class="logo-icon">ラボ</div>
      <div class="logo-text">子育て情報<span>ラボ</span></div>
    </a>
    <button class="header-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>
  </div>
</header>

<div class="categories">
  <button class="cat-tab active" data-cat="all">すべて</button>
  <button class="cat-tab" data-cat="news">🔥 ニュース</button>
  <button class="cat-tab" data-cat="sns">💬 SNS話題</button>
  <button class="cat-tab" data-cat="column">📝 コラム</button>
  <button class="cat-tab" data-cat="goods">🎁 グッズ</button>
  <button class="cat-tab" data-cat="exam">📚 受験</button>
</div>

<main class="main">
  <div id="featured-area"></div>
  <div id="article-list" class="article-list"></div>
</main>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      ホーム
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      人気
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      カテゴリ
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
      </svg>
      保存
    </button>
  </div>
</nav>

<script>
const categoryConfig = {
  news:       { label: 'ニュース', tagClass: 'tag-news',       bg: 'var(--accent-soft)', from: 'var(--accent-soft)', to: 'var(--mint-soft)' },
  sns:        { label: 'SNS話題',  tagClass: 'tag-sns',        bg: 'var(--sky-soft)',    from: 'var(--sky-soft)',    to: 'var(--mint-soft)' },
  column:     { label: 'コラム',   tagClass: 'tag-column',      bg: 'var(--mint-soft)',   from: 'var(--mint-soft)',   to: 'var(--sky-soft)' },
  goods:      { label: 'グッズ',   tagClass: 'tag-goods',       bg: 'var(--yellow-soft)', from: 'var(--yellow-soft)', to: 'var(--accent-soft)' },
  exam:       { label: '受験',     tagClass: 'tag-exam',        bg: 'var(--purple-soft)', from: 'var(--purple-soft)', to: 'var(--sky-soft)' }
};

let allArticles = [];
let currentCategory = 'all';

async function loadArticles() {
  try {
    const res = await fetch('articles.json?' + Date.now());
    allArticles = await res.json();
    renderArticles();
  } catch (e) {
    document.getElementById('featured-area').innerHTML = '';
    document.getElementById('article-list').innerHTML = '<div class="empty-state">記事を読み込めませんでした。</div>';
  }
}

function renderArticles() {
  const featuredArea = document.getElementById('featured-area');
  const articleList = document.getElementById('article-list');

  const filtered = currentCategory === 'all'
    ? allArticles
    : allArticles.filter(a => a.category === currentCategory);

  // Sort by date (newest first), same date → later in JSON comes first
  filtered.sort((a, b) => {
    const diff = b.date.replace(/\./g, '') - a.date.replace(/\./g, '');
    if (diff !== 0) return diff;
    return allArticles.indexOf(b) - allArticles.indexOf(a);
  });

  if (filtered.length === 0) {
    featuredArea.innerHTML = '';
    articleList.innerHTML = '<div class="empty-state">このカテゴリの記事はまだありません。</div>';
    return;
  }

  const featured = filtered[0];
  const rest = filtered.slice(1);
  const cat = categoryConfig[featured.category];

  featuredArea.innerHTML = `
    <a href="${featured.id}.html" class="featured">
      <div class="featured-img" style="background:linear-gradient(135deg,${cat.from} 0%,${cat.to} 100%)">
        <span class="featured-emoji">${featured.emoji}✨</span>
      </div>
      <div class="featured-body">
        <span class="featured-tag ${cat.tagClass}">${cat.label}</span>
        <h2 class="featured-title">${featured.title}</h2>
        <div class="featured-meta">
          <span>${featured.date}</span>
          <span class="dot"></span>
          <span>NEW</span>
        </div>
      </div>
    </a>`;

  articleList.innerHTML = rest.map((a, i) => {
    const c = categoryConfig[a.category];
    return `
      <a href="${a.id}.html" class="article-card" style="animation-delay:${0.05*(i+1)}s">
        <div class="article-thumb" style="background:${c.bg}">${a.emoji}</div>
        <div class="article-content">
          <h3 class="article-title">${a.title}</h3>
          <div class="article-bottom">
            <span class="article-tag ${c.tagClass}">${c.label}</span>
            <span class="article-date">${a.date}</span>
          </div>
        </div>
      </a>`;
  }).join('');
}

document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCategory = tab.dataset.cat;
    renderArticles();
  });
});

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
  });
});

loadArticles();

// ── Search functionality ──
const searchOverlay = document.getElementById('searchOverlay');
const searchPanel = document.getElementById('searchPanel');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const searchClose = document.getElementById('searchClose');
const searchBtn = document.querySelector('.header-search');

function openSearch() {
  searchOverlay.classList.add('open');
  searchPanel.classList.add('open');
  setTimeout(() => searchInput.focus(), 300);
}

function closeSearch() {
  searchOverlay.classList.remove('open');
  searchPanel.classList.remove('open');
  searchInput.value = '';
  searchResults.innerHTML = '<div class="search-hint">キーワードを入力すると記事を検索できます</div>';
}

searchBtn.addEventListener('click', openSearch);
searchClose.addEventListener('click', closeSearch);
searchOverlay.addEventListener('click', closeSearch);

searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  if (!query) {
    searchResults.innerHTML = '<div class="search-hint">キーワードを入力すると記事を検索できます</div>';
    return;
  }
  const results = allArticles.filter(a =>
    a.title.toLowerCase().includes(query) ||
    (categoryConfig[a.category]?.label || '').includes(query)
  );
  if (results.length === 0) {
    searchResults.innerHTML = '<div class="search-hint">「' + query + '」に一致する記事が見つかりませんでした</div>';
    return;
  }
  searchResults.innerHTML = results.map(a => {
    const c = categoryConfig[a.category] || { label: a.category, tagClass: '', bg: 'var(--bg)' };
    return `
      <a href="${a.id}.html" class="article-card">
        <div class="article-thumb" style="background:${c.bg}">${a.emoji}</div>
        <div class="article-content">
          <h3 class="article-title">${a.title}</h3>
          <div class="article-bottom">
            <span class="article-tag ${c.tagClass}">${c.label}</span>
            <span class="article-date">${a.date}</span>
          </div>
        </div>
      </a>`;
  }).join('');
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && searchPanel.classList.contains('open')) closeSearch();
});
</script>

</body>
</html>
